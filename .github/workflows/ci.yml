name: CI + Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest tests/ -v

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install @babel/core @babel/cli @babel/preset-react @babel/preset-env
      - name: Extract and compile JSX
        run: |
          sed -n '/<script type="text\/babel">/,/<\/script>/p' index.html | \
            sed '1d;$d' > /tmp/app.jsx
          npx babel /tmp/app.jsx --presets=@babel/preset-react,@babel/preset-env --out-file /tmp/app.js
          echo "Frontend JSX compiled successfully"

  deploy:
    needs: [test, lint-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud run deploy ml-dashboard \
            --source . \
            --region asia-east1 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --project ctbc-proto-2026
