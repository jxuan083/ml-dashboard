        const inputData = ds.source === 'csv' || ds.source === 'sheets'
          ? ds.data.rows.slice(0, 100)
          : genSyntheticData(ds).slice(0, 100);
        const t0 = performance.now();
        const resp = await fetch(api.url, {
          method: api.method || 'POST',
          headers: { 'Content-Type': 'application/json', ...hdrs },
          body: api.method !== 'GET' ? JSON.stringify({ [api.inputField || 'data']: inputData }) : undefined,
          signal: AbortSignal.timeout(30000),
        });
        const latency = `${Math.round(performance.now() - t0)}ms`;
        const text = await resp.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { data = { raw: text }; }
        setResult({ status: resp.status, latency, data });
        return;
      }
      const dsId = await ensureBackendDataset(ds);
      const activeParams = overrideParams ?? params;
      const fullParams = { ...activeParams };
      if (panel.type === 'predict') {
        fullParams.test_size = testSplit / 100;
        if (selectedFeatures.length) fullParams.feature_cols = selectedFeatures;
      }
      const resp = await fetch(`${API_BASE}/api/analyze/${panel.type}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataset_id: dsId, model_id: model?.id || initModelId, params: fullParams }),
      });
      if (!resp.ok) {
        const errBody = await resp.json().catch(() => ({}));
        throw new Error(errBody.detail || `API error ${resp.status}`);
      }
      const { result } = await resp.json();
      setResult(result);
      if (panel.type === 'predict') {
        const run = {
          ts: Date.now(),
          modelId: model?.id || initModelId,
          modelName: result.model || model?.label || model?.id || initModelId,
          params: { ...(overrideParams ?? params) },
          metrics: { accuracy: result.accuracy, f1: result.f1, precision: result.precision, recall: result.recall, roc_auc: result.roc_auc },
          testSplit,
          features: selectedFeatures,
          pinned: false,
        };
        sbSaveRun('predict', panel.dataset?.name, run).then(id => {
          setRunHistory(prev => [...prev, { ...run, id }]);
        });
      }
    } catch (err) {
      console.error('Analysis failed:', err);
      setResult({ _error: err.message });
    } finally {
      setLoading(false);
    }
  };

  const runCompare = async () => {
    if (!panel.dataset) return;
    setCompareLoading(true); setCompareResult(null);
    try {
      const dsId = await ensureBackendDataset(panel.dataset);
      const resp = await fetch(`${API_BASE}/api/analyze/predict/compare`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dataset_id: dsId,
          test_size: testSplit / 100,
          feature_cols: selectedFeatures.length ? selectedFeatures : [],
          models: compareParams,
        }),
      });
      if (!resp.ok) throw new Error(`API error ${resp.status}`);
      const { results } = await resp.json();
      setCompareResult(results);
      const ts = Date.now();
      const newRuns = results.filter(r => !r.error).map(r => ({
        ts: ts + r.rank,
        modelId: r.model_id,
        modelName: r.model || r.model_id,
        params: compareParams[r.model_id] || {},
        metrics: { accuracy: r.accuracy, f1: r.f1, precision: r.precision, recall: r.recall, roc_auc: r.roc_auc },
        testSplit,
        features: selectedFeatures,
        pinned: false,
      }));
      Promise.all(newRuns.map(run => sbSaveRun('predict', panel.dataset?.name, run)
        .then(id => ({ ...run, id }))
      )).then(saved => setRunHistory(prev => [...prev, ...saved]));
    } catch (err) {
      setCompareResult([{ model_id: 'error', model: 'Error', error: err.message, rank: 1, f1: 0, accuracy: 0, precision: 0, recall: 0 }]);
    } finally {
      setCompareLoading(false);
    }
  };

  useEffect(() => { if (panel.dataset) runAnalysis(panel.dataset, selectedModel); }, [panel.dataset]);

  const handleModelSelect = (model) => {
    const newParams = PARAM_PRESETS[panel.type]?.[model.id]?.mid || defaultParams(panel.type, model.id);
    setSelectedModel(model);
    setParams(newParams);
    setSimpleLevel('mid');
    if (panel.dataset) runAnalysis(panel.dataset, model, newParams);
  };

  const handleParamsChange = (newParams) => {
    setParams(newParams);
    if (panel.dataset) runAnalysis(panel.dataset, selectedModel, newParams);
  };

  const handleCompareParamChange = (modelId, key, val) => {
    setCompareParams(prev => ({ ...prev, [modelId]: { ...prev[modelId], [key]: val } }));
  };

  const handleRestore = (run) => {
    const model = { type: 'builtin', id: run.modelId, label: run.modelName };
    setSelectedModel(model);
    setParams(run.params);
    setTestSplit(run.testSplit);
    if (run.features?.length) setSelectedFeatures(run.features);
    setCompareMode(false);
    setShowModelSelector(true);
    if (panel.dataset) runAnalysis(panel.dataset, model, run.params);
  };

  const handlePin = (idx) => {
    setRunHistory(prev => prev.map((r, i) => {
      if (i !== idx) return r;
      const newPinned = !r.pinned;
      if (r.id) sbTogglePin(r.id, newPinned);
      return { ...r, pinned: newPinned };
    }));
  };

  const handleDragOver = (e) => {
    e.preventDefault();
    // if reordering a panel, delegate to parent
    if (onPanelDragOver && isDragging !== panel.id) {
      onPanelDragOver(panel.id, e);
      return;
    }
    setIsDatasetDragOver(true);
  };

  const handleDragLeave = (e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) {
      setIsDatasetDragOver(false);
      if (onPanelDragOver) onPanelDragOver(null, e);
    }
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setIsDatasetDragOver(false);
    // panel reorder drop
    if (isDragging) { onPanelDrop(panel.id); return; }
    // dataset drop
    try {
      const data = JSON.parse(e.dataTransfer.getData('application/json'));
      onDrop(panel.id, data);
    } catch(_) {}
  };

  const TYPE_CONFIG = { cluster:{ label:'分群分析' }, predict:{ label:'預測分析' }, recommend:{ label:'推薦引擎' } };
  const badgeClass = selectedModel?.type === 'external' ? 'external' : panel.type;
  const badgeLabel = selectedModel?.type === 'external' ? `⚡ ${selectedModel.label}` : TYPE_CONFIG[panel.type]?.label;

  let panelClass = 'panel';
  if (isDragging === panel.id) panelClass += ' dragging-panel';
  else if (reorderTarget === panel.id) panelClass += ' reorder-target-left';
  else if (isDatasetDragOver) panelClass += ' drop-target';

  return (
    <div className={panelClass} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
      <div className="panel-header">
        <span
          className="drag-handle"
          draggable
          title="拖動面板"
          onDragStart={e => { e.stopPropagation(); onPanelDragStart(panel.id); }}
          onDragEnd={onPanelDragEnd}
        >⠿</span>
        <span className={`panel-type-badge ${badgeClass}`}>{badgeLabel}</span>
        {panel.dataset
          ? <span className="panel-dataset-name">{panel.dataset.name}</span>
          : <span className="panel-dataset-none">拖入資料集...</span>
        }
        <div className="panel-actions">
          {panel.dataset && panel.type === 'predict' && (
            <button className={`panel-btn ${compareMode ? 'active' : ''}`} title="比較模式" onClick={() => { setCompareMode(v => !v); setShowSettings(false); setShowModelSelector(false); }}>
              ⊞
            </button>
          )}
          {panel.dataset && (
            <button className={`panel-btn ${showSettings ? 'active' : ''}`} title="資料設定" onClick={() => { setShowSettings(v => !v); setShowModelSelector(false); setCompareMode(false); }}>
              ⚙
            </button>
          )}
          {panel.dataset && !compareMode && (
            <button className={`panel-btn ${showModelSelector ? 'active' : ''}`} title="選擇模型" onClick={() => { setShowModelSelector(v => !v); setShowSettings(false); }}>
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
                <line x1="1.5" y1="2.5" x2="11.5" y2="2.5"/>
                <circle cx="4" cy="2.5" r="1.5" fill="currentColor" stroke="none"/>
                <line x1="1.5" y1="6.5" x2="11.5" y2="6.5"/>
                <circle cx="9" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
                <line x1="1.5" y1="10.5" x2="11.5" y2="10.5"/>
                <circle cx="4" cy="10.5" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </button>
          )}
          {panel.dataset && !compareMode && (
            <button className="panel-btn" title="重新執行" onClick={() => runAnalysis(panel.dataset, selectedModel)}>↻</button>
          )}
          <button className="panel-btn" title="關閉" onClick={() => onClose(panel.id)}>✕</button>
        </div>
      </div>

      {showSettings && panel.dataset && (() => {
        const cols = getDatasetCols(panel.dataset);
        return (
          <div className="settings-panel">
            {panel.type === 'predict' && (
            <div className="settings-row">
              <span className="settings-label">Test 比例</span>
              <div className="settings-split-input">
                <input type="number" min="10" max="50" step="5" value={testSplit}
                  onChange={e => setTestSplit(Math.max(10, Math.min(50, parseInt(e.target.value) || 20)))} />
                <span>%</span>
              </div>
              <span className="settings-hint">Train {100-testSplit}% / Test {testSplit}%</span>
            </div>
            )}
            {cols.length > 0 && (
              <div className="settings-row" style={{ flexDirection:'column', alignItems:'flex-start' }}>
                <div style={{ display:'flex', alignItems:'center', width:'100%', marginBottom:6 }}>
                  <span className="settings-label">特徵欄位</span>
                  <div className="settings-feat-actions">
                    <button className="settings-feat-btn" onClick={() => setSelectedFeatures(cols.slice(0,-1))}>全選</button>
                    <button className="settings-feat-btn" onClick={() => setSelectedFeatures([])}>清空</button>
                  </div>
                </div>
                <div className="feature-checkboxes">
                  {cols.map((col, i) => {
                    const isTarget = i === cols.length - 1;
                    const checked = selectedFeatures.includes(col);
                    return (
                      <label key={col} className={`feature-checkbox ${checked ? 'checked' : ''}`}
                        title={isTarget ? '最後欄位為目標變數（自動排除）' : col}>
                        <input type="checkbox" disabled={isTarget}
                          checked={isTarget ? false : checked}
                          onChange={e => setSelectedFeatures(prev =>
                            e.target.checked ? [...prev, col] : prev.filter(c => c !== col)
                          )} />
                        {col}{isTarget ? ' *' : ''}
                      </label>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {compareMode && panel.dataset && (
        <>
          <ComparePanel
            panelType={panel.type}
            compareParams={compareParams}
            onParamsChange={handleCompareParamChange}
            onRun={runCompare}
            running={compareLoading}
            testSplit={testSplit}
          />
          {compareLoading && (
            <div className="analysis-loading" style={{ padding:'12px 16px' }}>
              <div className="spinner" /><span>四個模型分析中...</span>
            </div>
          )}
          {compareResult && !compareLoading && (
            <div className="panel-body" style={{ borderTop:'1px solid var(--border)' }}>
              <CompareResults results={compareResult} />
            </div>
          )}
        </>
      )}

      {showModelSelector && panel.dataset && !compareMode && (
        <ModelSelector
          panelType={panel.type}
          selectedModel={selectedModel}
          selectedChart={selectedChart}
          externalApis={externalApis}
          expertMode={expertMode}
          params={params}
          onSelect={handleModelSelect}
          onChartChange={setSelectedChart}
          onExpertModeChange={setExpertMode}
          onParamsChange={handleParamsChange}
          simpleLevel={simpleLevel}
          onSimpleLevelChange={setSimpleLevel}
        />
      )}

      {panel.dataset && result && !loading && !compareMode && (
        <DataPreview dataset={panel.dataset} />
      )}

      {!compareMode && <div className="panel-body">
        {!panel.dataset ? (
          <div className={`drop-zone ${isDatasetDragOver ? 'active' : ''}`}>
            <div className="drop-zone-icon">⊕</div>
            <div>將資料集拖曳到這裡</div>
            <div style={{ marginTop:4, fontSize:11 }}>或從左側選擇資料集</div>
          </div>
        ) : loading ? (
          <div className="analysis-loading">
            <div className="spinner" />
            <span>{selectedModel?.type === 'external' ? `呼叫 ${selectedModel.label}...` : '分析中...'}</span>
          </div>
        ) : result?._error ? (
          <div style={{ padding:'20px 16px', color:'#DC2626', fontSize:12, fontFamily:'DM Mono', background:'#FEF2F2', margin:'12px', borderRadius:8, border:'1px solid #FECACA' }}>
            {result._error}
            <div style={{ marginTop:6, color:'#9CA3AF', fontFamily:'DM Sans' }}>確認後端是否已啟動：uvicorn main:app --reload</div>
          </div>
        ) : result ? (
          selectedModel?.type === 'external' ? <ExtContent result={result} /> :
          panel.type === 'cluster' ? <ClusterContent result={result} chartType={selectedChart} /> :
          panel.type === 'predict' ? <PredictContent result={result} chartType={selectedChart} /> :
          <RecommendContent result={result} chartType={selectedChart} />
        ) : null}
      </div>}
      {!compareMode && <OutputSection result={result} />}
      {panel.type === 'predict' && (
        <RunHistory
          runs={runHistory}
          onRestore={handleRestore}
          onPin={handlePin}
          onClear={() => setRunHistory([])}
        />
      )}
    </div>
  );
}

// ── Add External API Modal ──
function AddExtApiModal({ onSave, onClose }) {
  const [form, setForm] = useState({
    name: '', url: '', method: 'POST',
    headers: [{ key: 'Authorization', value: 'Bearer ' }],
    inputField: 'data', outputNote: '',
  });
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const addHeader = () => setForm(f => ({ ...f, headers: [...f.headers, { key: '', value: '' }] }));
  const removeHeader = (i) => setForm(f => ({ ...f, headers: f.headers.filter((_, idx) => idx !== i) }));
  const setHeader = (i, k, v) => setForm(f => ({
    ...f, headers: f.headers.map((h, idx) => idx === i ? { ...h, [k]: v } : h)
  }));

  const handleTest = async () => {
    if (!form.url) return;
    setTesting(true);
    setTestResult(null);
    const t0 = performance.now();
    try {
      const hdrs = {};
      form.headers.forEach(h => { if (h.key && h.value) hdrs[h.key] = h.value; });
      const resp = await fetch(form.url, {
        method: form.method,
        headers: { 'Content-Type': 'application/json', ...hdrs },
        body: form.method !== 'GET' ? JSON.stringify({ [form.inputField || 'data']: 'test' }) : undefined,
        signal: AbortSignal.timeout(10000),
      });
      const latency = Math.round(performance.now() - t0);
      setTestResult({ ok: resp.ok, msg: resp.ok ? `連線成功 · ${resp.status} · ${latency}ms` : `失敗 · ${resp.status} ${resp.statusText}` });
    } catch (err) {
      const latency = Math.round(performance.now() - t0);
      const msg = err.name === 'TimeoutError' ? `逾時 (>10s)` : err.message || '連線失敗';
      setTestResult({ ok: false, msg: `${msg} · ${latency}ms` });
    } finally {
      setTesting(false);
    }
  };

  const handleSave = () => {
    if (!form.name || !form.url) return;
    onSave({ id: `ext_${Date.now()}`, ...form });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">新增外部模型 API</div>
            <div className="modal-sub">串接自己部署的模型或第三方推論服務</div>
          </div>
          <button className="panel-btn" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">API 名稱</label>
              <input className="form-input" placeholder="My Model v2" value={form.name} onChange={e => set('name', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Method</label>
              <select className="form-select" value={form.method} onChange={e => set('method', e.target.value)}>
                <option>POST</option>
                <option>GET</option>
              </select>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Endpoint URL</label>
            <input className="form-input mono" placeholder="https://your-model.api.com/predict" value={form.url} onChange={e => set('url', e.target.value)} />
          </div>

          <div className="form-group">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:5 }}>
              <label className="form-label" style={{ marginBottom:0 }}>Headers</label>
              <button className="btn btn-ghost" style={{ padding:'3px 8px', fontSize:11 }} onClick={addHeader}>+ 新增</button>
            </div>
            <div className="headers-list">
              {form.headers.map((h, i) => (
                <div key={i} className="header-row">
                  <input className="form-input mono" placeholder="Key" value={h.key} onChange={e => setHeader(i, 'key', e.target.value)} />
                  <input className="form-input mono" placeholder="Value" value={h.value} onChange={e => setHeader(i, 'value', e.target.value)} />
                  <button className="header-del" onClick={() => removeHeader(i)}>✕</button>
                </div>
              ))}
            </div>
          </div>

          <div className="form-row">
            <div className="form-group">
              <label className="form-label">輸入欄位名稱</label>
              <input className="form-input mono" placeholder="data" value={form.inputField} onChange={e => set('inputField', e.target.value)} />
              <span style={{ fontSize:10, color:'var(--text-muted)', marginTop:2 }}>資料集會以此欄位名傳入 request body</span>
            </div>
            <div className="form-group">
              <label className="form-label">預期輸出欄位（選填）</label>
              <input className="form-input mono" placeholder="prediction, confidence" value={form.outputNote} onChange={e => set('outputNote', e.target.value)} />
              <span style={{ fontSize:10, color:'var(--text-muted)', marginTop:2 }}>僅供備忘，不影響實際呼叫</span>
            </div>
          </div>

          <div className="info-box">
            系統會將 Dataset 的 <code style={{ fontFamily:'DM Mono', background:'#BAE6FD', padding:'0 3px', borderRadius:3 }}>{form.inputField || 'data'}</code> 欄位打包成 JSON 傳入，格式：
            <span style={{ fontFamily:'DM Mono', fontSize:11, display:'block', marginTop:4, color:'#0369A1' }}>
              {`{ "${form.inputField || 'data'}": [...rows], "dataset_name": "...", "rows": N }`}
            </span>
          </div>

          {testResult && (
            <div className={`test-result ${testResult.ok ? 'success' : 'error'}`}>
              {testResult.ok ? '✓' : '✗'} {testResult.msg}
            </div>
          )}
        </div>

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={handleTest} disabled={!form.url || testing}>
            {testing ? '測試中...' : '⚡ 測試連線'}
          </button>
          <button className="btn btn-ghost" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!form.name || !form.url}>儲存</button>
        </div>
      </div>
    </div>
  );
}

              <span className="code-key">with</span> client.stream(<span className="code-string">"即時事件"</span>, flush_every=5.0) <span className="code-key">as</span> stream:{'\n'}
              {'  '}<span className="code-key">for</span> event <span className="code-key">in</span> your_event_source():{'\n'}
              {'    '}stream.add(event){'\n'}
            </div>
            <div style={{ padding:'10px 14px', background:'#EFF6FF', borderRadius:8, border:'1px solid #BFDBFE', fontSize:12, color:'#1E40AF', lineHeight:1.6 }}>
              串流模式會自動 buffer 資料，每 5 秒或滿 100 筆時自動送出。Dashboard 透過 WebSocket 即時更新。
            </div>
          </>}
          {tab === 'js' && <>
            <div className="code-block">
              <span className="code-comment">// npm install ml-platform-sdk</span>{'\n'}
              <span className="code-key">import</span> {'{ MLPlatform }'} <span className="code-key">from</span> <span className="code-string">'ml-platform-sdk'</span>;{'\n\n'}
              <span className="code-key">const</span> client = <span className="code-key">new</span> MLPlatform(<span className="code-string">'http://localhost:8000'</span>);{'\n\n'}
              <span className="code-comment">// 建立資料集並推送</span>{'\n'}
              <span className="code-key">const</span> ds = <span className="code-key">await</span> client.createDataset(<span className="code-string">'用戶點擊'</span>, {'{ project: \'ecom\' }'});{'\n'}
              <span className="code-key">await</span> ds.push([{'{ page: \'/home\', clicks: 42 }'}]);{'\n\n'}
              <span className="code-comment">// 串流模式：每 5 秒自動 flush</span>{'\n'}
              <span className="code-key">const</span> stream = client.stream(<span className="code-string">'即時事件'</span>, {'{ flushEvery: 5000 }'});{'\n'}
              stream.add({'{ event: \'click\', ts: Date.now() }'});{'\n'}
              <span className="code-comment">// 結束時呼叫 stream.close()</span>
            </div>
            <div style={{ padding:'10px 14px', background:'#ECFDF5', borderRadius:8, border:'1px solid #A7F3D0', fontSize:12, color:'#065F46', lineHeight:1.6 }}>
              支援 Node.js 和瀏覽器。串流模式每 5 秒或滿 100 筆自動 flush，Dashboard 即時顯示新資料。
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ── CSV Parser ──
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return null;
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
    return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? '']));
  });
  return { headers, rows };
}

function extractSheetId(url) {
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : null;
}

// ── Dataset Upload Section ──
function DatasetUploader({ onAdd }) {
  const [dragOver, setDragOver] = useState(false);
  const [sheetsUrl, setSheetsUrl] = useState('');
  const [sheetsLoading, setSheetsLoading] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  const processFile = (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['csv', 'xlsx', 'xls'].includes(ext)) { setError('支援 .csv / .xlsx / .xls'); return; }
    setError('');

    if (ext === 'csv') {
      const reader = new FileReader();
      reader.onload = (e) => {
        const parsed = parseCSV(e.target.result);
        if (!parsed) { setError('CSV 格式無法解析'); return; }
        onAdd({
          id: `upload_${Date.now()}`,
          name: file.name.replace('.csv', ''),
          icon: 'C',
          iconBg: '#DBEAFE',
          rows: parsed.rows.length,
          cols: parsed.headers.length,
          source: 'csv',
          data: parsed,
        });
      };
      reader.readAsText(file);
    } else {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
          if (!json.length) { setError('Excel 檔案為空'); return; }
          const headers = Object.keys(json[0]);
          onAdd({
            id: `upload_${Date.now()}`,
            name: file.name.replace(/\.(xlsx|xls)$/, ''),
            icon: 'X',
            iconBg: '#D1FAE5',
            rows: json.length,
            cols: headers.length,
            source: 'xlsx',
            data: { headers, rows: json },
          });
        } catch(e) { setError('Excel 檔案無法解析'); }
      };
      reader.readAsArrayBuffer(file);
    }
  };

  const handleFileDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    processFile(e.dataTransfer.files[0]);
  };

  const handleSheetsImport = () => {
    const id = extractSheetId(sheetsUrl);
    if (!id) { setError('無效的 Google Sheets 網址'); return; }
    setError(''); setSheetsLoading(true);
    // Use the public CSV export endpoint
    const exportUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;
    fetch(exportUrl)
      .then(r => { if (!r.ok) throw new Error('無法存取，請確認試算表已設為公開'); return r.text(); })
      .then(text => {
        const parsed = parseCSV(text);
        if (!parsed) throw new Error('資料格式無法解析');
        onAdd({
          id: `sheets_${Date.now()}`,
          name: `Sheets ${id.slice(0,8)}...`,
          icon: 'D',
          iconBg: '#A7F3D0',
          rows: parsed.rows.length,
          cols: parsed.headers.length,
          source: 'sheets',
          data: parsed,
        });
        setSheetsUrl(''); setSheetsLoading(false);
      })
      .catch(err => { setError(err.message); setSheetsLoading(false); });
  };

  return (
    <div style={{ padding: '0 16px 12px' }}>
      {/* CSV Upload */}
      <div
        className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
        onClick={() => fileRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleFileDrop}
      >
        <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={e => processFile(e.target.files[0])} />
        <div style={{ fontSize: 18, marginBottom: 4 }}>⊕</div>
        <div className="upload-zone-text">
          <strong>點擊上傳</strong> 或拖曳 CSV / Excel 進來
        </div>
      </div>

      {/* Google Sheets */}
      <div className="sheets-row">
        <input
          className="sheets-input"
          placeholder="貼上 Google Sheets 網址"
          value={sheetsUrl}
          onChange={e => { setSheetsUrl(e.target.value); setError(''); }}
          onKeyDown={e => e.key === 'Enter' && handleSheetsImport()}
        />
        <button className="sheets-btn" onClick={handleSheetsImport} disabled={!sheetsUrl || sheetsLoading}>
          {sheetsLoading ? '...' : '匯入'}
        </button>
      </div>

      {error && (
        <div style={{ fontSize: 11, color: '#DC2626', background: '#FEF2F2', padding: '6px 8px', borderRadius: 5, border: '1px solid #FECACA' }}>
          {error}
        </div>
      )}
    </div>
  );
}

// ── App ──
function App() {
  const [user, setUser] = useState(undefined); // undefined=checking, null=not logged in
  const devMode = useRef(false);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => {
      if (!devMode.current) setUser(u ?? null);
    });
    return () => unsub();
  }, []);

  const handleDevBypass = () => {
    devMode.current = true;
    setUser({ email: 'dev@local' });
  };

  if (user === undefined) return null; // still checking
  if (user === null) return <AuthGate onAuth={setUser} devBypass={handleDevBypass} />;
  return <Dashboard user={user} />;
}

function Dashboard({ user }) {
  const [activeProject, setActiveProject] = useState('ecom');
  const defaultPanels = {
    ecom: [
      { id: 'p1', type: 'cluster', dataset: DATASETS.ecom[0] },
      { id: 'p2', type: 'predict', dataset: DATASETS.ecom[0] },
      { id: 'p3', type: 'recommend', dataset: null },
    ],
    bank: [
      { id: 'p4', type: 'predict', dataset: DATASETS.bank[0] },
      { id: 'p5', type: 'cluster', dataset: DATASETS.bank[1] },
    ],
    health: [
      { id: 'p6', type: 'cluster', dataset: DATASETS.health[0] },
      { id: 'p7', type: 'predict', dataset: DATASETS.health[1] },
      { id: 'p8', type: 'recommend', dataset: null },
    ],
  };
  const [allPanels, setAllPanels] = useState(defaultPanels);
  const panels = allPanels[activeProject] || [];
  const setPanels = (updater) => setAllPanels(prev => ({
    ...prev,
    [activeProject]: typeof updater === 'function' ? updater(prev[activeProject] || []) : updater,
  }));
  const [externalApis, setExternalApis] = useState([
    { id: 'ext1', name: 'HuggingFace Inference', url: 'https://api-inference.huggingface.co/models/my-model', method: 'POST', headers: [{ key: 'Authorization', value: 'Bearer hf_xxx' }], inputField: 'inputs' },
  ]);
  const [showAddExt, setShowAddExt] = useState(false);
  const [showApiDocs, setShowApiDocs] = useState(false);
  const [apiOnline, setApiOnline] = useState(null); // null=checking, true=ok, false=down
  const [viewMode, setViewMode] = useState('grid'); // 'grid' | 'focus'
  const [sidebarOpen, setSidebarOpen] = useState(true);

  useEffect(() => {
    const check = () => fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) })
      .then(r => setApiOnline(r.ok))
      .catch(() => setApiOnline(false));
    check();
    const t = setInterval(check, 15000);
    return () => clearInterval(t);
  }, []);

  // Real-time dataset updates via WebSocket (with polling fallback)
  const knownPushedIds = useRef(new Set());
  useEffect(() => {
    let ws = null;
    let pollTimer = null;

    const handleDatasetEvent = (evt) => {
      if (evt.type === 'dataset_new') {
        const ds = evt.dataset;
        if (knownPushedIds.current.has(ds.id)) return;
        knownPushedIds.current.add(ds.id);
        const proj = ds.project || 'default';
        const newDs = {
          id: `pushed_${ds.id}`,
          backendId: ds.id,
          name: ds.name,
          icon: ds.name[0]?.toUpperCase() || 'D',
          rows: ds.row_count || ds.rows || 0,
          cols: ds.col_count || ds.cols || 0,
          iconBg: '#E0E7FF',
          source: 'api',
        };
        setAllUploadedDatasets(prev => {
          const existing = prev[proj] || [];
          if (existing.some(d => d.id === newDs.id)) return prev;
          return { ...prev, [proj]: [newDs, ...existing] };
        });
      } else if (evt.type === 'dataset_updated') {
        setAllUploadedDatasets(prev => {
          const updated = {};
          for (const [proj, list] of Object.entries(prev)) {
            updated[proj] = list.map(d =>
              d.backendId === evt.id ? { ...d, rows: evt.rows, cols: evt.cols } : d
            );
          }
          return updated;
        });
      }
    };

    // Try WebSocket
    const wsUrl = API_BASE.replace(/^http/, 'ws') + '/ws';
    try {
      ws = new WebSocket(wsUrl);
      ws.onmessage = (e) => {
        try { handleDatasetEvent(JSON.parse(e.data)); } catch(err) {}
      };
      ws.onerror = () => { ws.close(); };
      ws.onclose = () => { startPolling(); };
    } catch(e) { startPolling(); }

    // Polling fallback
    function startPolling() {
      if (pollTimer) return;
      const poll = () => fetch(`${API_BASE}/api/datasets`, { signal: AbortSignal.timeout(5000) })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data?.datasets) return;
          data.datasets.forEach(ds => handleDatasetEvent({ type: 'dataset_new', dataset: ds }));
        })
        .catch(() => {});
      poll();
      pollTimer = setInterval(poll, 10000);
    }

    return () => {
      if (ws) ws.close();
      if (pollTimer) clearInterval(pollTimer);
    };
  }, []);
  const [activeTab, setActiveTab] = useState('p1');
  const [draggingPanelId, setDraggingPanelId] = useState(null);
  const [reorderTarget, setReorderTarget] = useState(null);
  const idCounter = useRef(4);

  const addPanel = (type) => {
    const id = `p${idCounter.current++}`;
    setPanels(prev => [...prev, { id, type, dataset: null }]);
    setActiveTab(id);
  };

  const closePanel = (id) => {
    setPanels(prev => {
      const next = prev.filter(p => p.id !== id);
      if (activeTab === id && next.length > 0) setActiveTab(next[next.length - 1].id);
      return next;
    });
  };

  const dropDataset = (panelId, dataset) => {
    setPanels(prev => prev.map(p => p.id === panelId ? { ...p, dataset } : p));
  };

  const saveExtApi = (api) => {
    setExternalApis(prev => [...prev, api]);
    setShowAddExt(false);
  };

  const deleteExtApi = (id) => setExternalApis(prev => prev.filter(a => a.id !== id));

  // Panel reorder
  const handlePanelDragStart = (id) => setDraggingPanelId(id);
  const handlePanelDragEnd = () => { setDraggingPanelId(null); setReorderTarget(null); };
  const handlePanelDragOver = (targetId) => { if (targetId !== draggingPanelId) setReorderTarget(targetId); };
  const handlePanelDrop = (targetId) => {
    if (!draggingPanelId || draggingPanelId === targetId) { handlePanelDragEnd(); return; }
    setPanels(prev => {
      const arr = [...prev];
      const fromIdx = arr.findIndex(p => p.id === draggingPanelId);
      const toIdx = arr.findIndex(p => p.id === targetId);
      const [removed] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, removed);
      return arr;
    });
    handlePanelDragEnd();
  };

  // Tab drag reorder
  const [draggingTab, setDraggingTab] = useState(null);
  const [tabDragOver, setTabDragOver] = useState(null);
  const handleTabDrop = (targetId) => {
    if (!draggingTab || draggingTab === targetId) { setDraggingTab(null); setTabDragOver(null); return; }
    setPanels(prev => {
      const arr = [...prev];
      const from = arr.findIndex(p => p.id === draggingTab);
      const to = arr.findIndex(p => p.id === targetId);
      const [r] = arr.splice(from, 1);
      arr.splice(to, 0, r);
      return arr;
    });
    setDraggingTab(null); setTabDragOver(null);
  };

  const [allUploadedDatasets, setAllUploadedDatasets] = useState({});
  const uploadedDatasets = allUploadedDatasets[activeProject] || [];
  const addUploadedDataset = (ds) => setAllUploadedDatasets(prev => ({
    ...prev,
    [activeProject]: [ds, ...(prev[activeProject] || [])],
  }));

  const datasets = [...(DATASETS[activeProject] || []), ...uploadedDatasets];
  const TYPE_LABEL = { cluster:'分群', predict:'預測', recommend:'推薦', code:'Code' };

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-logo"><div className="dot" />ML Platform</div>
        <div className="topbar-divider" />
        <div className="topbar-api-status">
          <div className="indicator" style={{ background: apiOnline === null ? '#D97706' : apiOnline ? '#059669' : '#DC2626' }} />
          {apiOnline === null ? 'API: 連線中...' : apiOnline ? `API: Online` : 'API: 離線'}
        </div>
        <div className="topbar-actions">
          <button className="btn btn-ghost" onClick={() => setShowApiDocs(true)}>API 串接</button>
          <button className="btn btn-primary">+ 新增 Project</button>
          <div className="topbar-divider" />
          <div className="auth-user">
            <span className="auth-user-email">{user.email}</span>
            <button className="auth-signout" onClick={() => auth.signOut()}>登出</button>
          </div>
        </div>
      </div>

      <div className="main">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-label">Projects</div>
            {PROJECTS.map(p => (
              <div key={p.id} className={`project-item ${activeProject === p.id ? 'active' : ''}`} onClick={() => setActiveProject(p.id)}>
                <span className="icon">{p.icon}</span>{p.name}<span className="count">{p.datasetCount}</span>
              </div>
            ))}
          </div>

          <div className="sidebar-divider" />

          <div className="sidebar-section" style={{ paddingBottom:8 }}>
            <div className="sidebar-label">Datasets</div>
          </div>
          <DatasetUploader onAdd={addUploadedDataset} />
          <div className="dataset-list scrollbar-thin" style={{ flex:'none', maxHeight:220, overflowY:'auto', paddingTop:0 }}>
            {datasets.map(ds => (
              <div
                key={ds.id} className="dataset-item" draggable
                onDragStart={e => e.dataTransfer.setData('application/json', JSON.stringify(ds))}
              >
                <div className="dataset-icon" style={{ background: ds.iconBg }}>{ds.icon}</div>
                <div className="dataset-meta">
                  <div className="dataset-name">{ds.name}</div>
                  <div className="dataset-info">
                    {ds.source === 'csv' && <span className="upload-tag csv">CSV</span>}
                    {ds.source === 'xlsx' && <span className="upload-tag xlsx">Excel</span>}
                    {ds.source === 'sheets' && <span className="upload-tag sheets">Sheets</span>}
                    {ds.source === 'api' && <span className="upload-tag api">API</span>}
                    <span className="dataset-stat">{ds.rows.toLocaleString()} rows</span>
                    <span className="dataset-stat">{ds.cols} cols</span>
                  </div>
                </div>
                <span className="dataset-drag-hint">⠿</span>
              </div>
            ))}
          </div>

          <div className="sidebar-divider" />

          <div className="sidebar-section" style={{ paddingBottom:8 }}>
            <div className="sidebar-label">外部模型 API</div>
          </div>
          <div className="dataset-list scrollbar-thin">
            {externalApis.map(api => (
              <div key={api.id} className="ext-api-item" title={api.url}>
                <div className="ext-api-dot" />
                <div className="ext-api-meta">
                  <div className="ext-api-name">{api.name}</div>
                  <div className="ext-api-url">{api.url}</div>
                </div>
                <button className="header-del" onClick={() => deleteExtApi(api.id)} title="移除">✕</button>
              </div>
            ))}
            <button className="add-ext-btn" onClick={() => setShowAddExt(true)}>
              + 新增外部 API
            </button>
          </div>
        </div>

        {/* Workspace */}
        <div className="workspace scrollbar-thin">
          <div className="workspace-toolbar">
            <div>
              <div className="workspace-title">分析工作區</div>
              <div className="workspace-subtitle">{PROJECTS.find(p => p.id === activeProject)?.name} · {panels.length} 個面板</div>
            </div>
            <div className="view-toggle">
              <button className={`view-toggle-btn ${viewMode === 'grid' ? 'active' : ''}`} title="並排檢視" onClick={() => setViewMode('grid')}>⊞</button>
              <button className={`view-toggle-btn ${viewMode === 'focus' ? 'active' : ''}`} title="單一檢視" onClick={() => setViewMode('focus')}>▣</button>
            </div>
            <div className="add-panel-menu">
              <button className="panel-type-btn cluster" onClick={() => addPanel('cluster')}>+ 分群</button>
              <button className="panel-type-btn predict" onClick={() => addPanel('predict')}>+ 預測</button>
              <button className="panel-type-btn recommend" onClick={() => addPanel('recommend')}>+ 推薦</button>
              <button className="panel-type-btn code" onClick={() => addPanel('code')}>&gt;_ Code</button>
            </div>
          </div>

          {panels.length === 0 ? (
            <div className="workspace-empty">
              <div className="workspace-empty-icon">◫</div>
              <div className="workspace-empty-title">工作區是空的</div>
              <div className="workspace-empty-sub">點擊右上角新增分析面板，再將資料集拖曳進去</div>
            </div>
          ) : viewMode === 'grid' ? (
            <div className="panels-grid">
              {panels.map(panel => {
                const PanelComp = panel.type === 'code' ? CodePanel : Panel;
                return (
                  <PanelComp
                    key={panel.id}
                    panel={panel}
                    externalApis={externalApis}
                    onClose={closePanel}
                    onDrop={dropDataset}
                    isDragging={draggingPanelId}
                    reorderTarget={reorderTarget}
                    onPanelDragStart={handlePanelDragStart}
                    onPanelDragEnd={handlePanelDragEnd}
                    onPanelDragOver={handlePanelDragOver}
                    onPanelDrop={handlePanelDrop}
                  />
                );
              })}
            </div>
          ) : (
            // ── Focus mode ──
            <div style={{ display:'flex', flexDirection:'column', flex:1, minHeight:0 }}>
              <div className="focus-tabbar">
                {panels.map(p => (
                  <div
                    key={p.id}
                    className={`focus-tab ${activeTab === p.id ? 'active' : ''} ${tabDragOver === p.id ? 'tab-drag-over' : ''}`}
                    draggable
                    onClick={() => setActiveTab(p.id)}
                    onDragStart={() => setDraggingTab(p.id)}
                    onDragEnd={() => { setDraggingTab(null); setTabDragOver(null); }}
                    onDragOver={e => { e.preventDefault(); setTabDragOver(p.id); }}
                    onDragLeave={() => setTabDragOver(null)}
                    onDrop={() => handleTabDrop(p.id)}
                  >
                    <span className={`focus-tab-badge ${p.type}`}>{TYPE_LABEL[p.type]}</span>
                    <span>{p.dataset ? p.dataset.name : '(空白)'}</span>
                    <span className="focus-tab-close" onClick={e => { e.stopPropagation(); closePanel(p.id); }}>✕</span>
                  </div>
                ))}
              </div>
              <div className="focus-panel-wrap">
                {panels.filter(p => p.id === activeTab).map(panel => {
                  const PanelComp = panel.type === 'code' ? CodePanel : Panel;
                  return (
                    <PanelComp
                      key={panel.id}
                      panel={panel}
                      externalApis={externalApis}
                      onClose={closePanel}
                      onDrop={dropDataset}
                      isDragging={null}
                      reorderTarget={null}
                      onPanelDragStart={() => {}}
                      onPanelDragEnd={() => {}}
                      onPanelDragOver={() => {}}
                      onPanelDrop={() => {}}
                    />
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {showAddExt && <AddExtApiModal onSave={saveExtApi} onClose={() => setShowAddExt(false)} />}
      {showApiDocs && <ApiDocsModal onClose={() => setShowApiDocs(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
